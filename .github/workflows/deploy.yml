name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: echo "${{ secrets.EC2_ENV_PRODUCTION }}" > .env.production

      - name: Build SSR
        run: npm run build:ssr

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          REMOTE_DIR="~/web/coinsect_frontend"
          SSH_CMD="ssh -i ~/.ssh/deploy_key ${EC2_USERNAME}@${EC2_HOST}"
          SCP_CMD="scp -i ~/.ssh/deploy_key"

          # 1. 빌드 결과물을 tar로 묶기
          tar czf deploy.tar.gz dist/ was/ package.json package-lock.json

          # 2. EC2로 전송
          ${SCP_CMD} deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:${REMOTE_DIR}/deploy.tar.gz

          # 3. EC2에서 압축 해제 및 재시작
          ${SSH_CMD} << 'ENDSSH'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            cd ~/web/coinsect_frontend
            tar xzf deploy.tar.gz
            rm deploy.tar.gz
            npm install --omit=dev
            NODE_ENV=production pm2 restart coinsect_frontend || NODE_ENV=production pm2 start was/server.js --name "coinsect_frontend"
          ENDSSH
